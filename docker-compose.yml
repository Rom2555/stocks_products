version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:

services:
  postgres:
    image: postgres:13-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: netology_stocks_products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn stocks_products.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./:/app
      - static_volume:/app/static
    expose:
      - 8000
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - DB_NAME=netology_stocks_products
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.21-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped
